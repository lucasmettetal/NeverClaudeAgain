<!DOCTYPE html>
<html>

<body>
  <script>
    const workerCode = `
    self.onmessage = (event) => {
      const { userCode, tests } = event.data;
      try {
        const cleanCode = userCode.replace(/export\\s+/g, "").replace(/:\\s*[A-Za-z_][\\w<>\\[\\]]*/g, "");

        eval(cleanCode);
        const results = tests.map((test) => {
          const actual = sum(...test.args);
          return { args: test.args, expected: test.expected, actual, passed: actual === test.expected };
        });
        self.postMessage({ success: true, results });
      } catch (error) {
        self.postMessage({ success: false, error: error.message });
      }
    };
  `;

    window.addEventListener("message", (event) => {
      const blob = new Blob([workerCode], { type: "application/javascript" });
      const worker = new Worker(URL.createObjectURL(blob));

      const timeout = setTimeout(() => {
        worker.terminate();
        window.parent.postMessage({ success: false, error: "Timeout : le code met trop de temps a s'executer" }, "*");
      }, 3000);

      worker.onmessage = (workerEvent) => {
        clearTimeout(timeout);
        window.parent.postMessage(workerEvent.data, "*");
      };

      worker.postMessage(event.data);
    });
  </script>
</body>

</html>
